spring.application.name=demo
spring.config.import=optional:file:.env[.properties]
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.username=${DATABASE_USERNAME}
springdoc.api-docs.path=/api/swagger/swagger.json
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.path=/api/swagger
springdoc.swagger-ui.displayRequestDuration=true
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.enabled=true
spring.servlet.multipart.resolve-lazily=true
server.tomcat.max-http-form-post-size=500MB
server.tomcat.max-swallow-size=500MB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB